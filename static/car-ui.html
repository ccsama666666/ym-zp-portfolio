<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>车机系统 UI — 智能座舱中控界面</title>
<style>
  :root {
    --bg: #0a0d13;
    --panel: #141820;
    --panel2: #1a1f2b;
    --accent: #4da6ff;
    --accent2: #00d4aa;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e8ecf1;
    --text2: #8b92a0;
    --text3: #5a6170;
    --border: #252a35;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  /* === 车机屏幕外框 === */
  .car-display {
    width: 1024px;
    height: 680px;
    background: var(--bg);
    border-radius: 24px;
    border: 3px solid #1e2330;
    box-shadow:
      0 0 0 6px #0f1117,
      0 0 0 9px #1a1d24,
      0 20px 60px rgba(0,0,0,.6),
      inset 0 1px 0 rgba(255,255,255,.03);
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* === 左侧常驻 Dock === */
  .dock {
    width: 72px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 6px;
    z-index: 2;
  }
  .dock-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .dock-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .dock-icon.active {
    background: rgba(77,166,255,.15);
    color: var(--accent);
  }
  .dock-icon.active::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }
  .dock-icon:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .dock-spacer { flex: 1; }

  /* === 主内容区 === */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 20px;
    gap: 14px;
    overflow: hidden;
  }

  /* === 顶部状态栏 === */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 28px;
    padding: 0 4px;
  }
  .top-bar .time {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: .5px;
  }
  .top-bar .status-icons {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text2);
    font-size: 12px;
    font-weight: 500;
  }
  .status-icons .signal { display: flex; align-items: center; gap: 4px; }
  .status-icons .battery { display: flex; align-items: center; gap: 5px; color: var(--accent2); }
  .status-icons .temp { color: var(--text); }

  /* === 双卡片行 === */
  .card-row {
    display: flex;
    gap: 14px;
    flex: 1;
    min-height: 0;
  }

  /* === 地图卡片 (大) === */
  .map-card {
    flex: 1.5;
    background: var(--panel);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .map-card .map-header {
    position: absolute;
    top: 14px;
    left: 14px;
    right: 14px;
    display: flex;
    justify-content: space-between;
    z-index: 1;
  }
  .map-search {
    background: rgba(20,24,32,.9);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text2);
    font-size: 13px;
  }
  .map-search svg { width: 16px; height: 16px; opacity: .6; }
  .map-compass {
    width: 36px; height: 36px;
    background: rgba(20,24,32,.9);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 16px; font-weight: 700;
  }
  .map-svg { flex: 1; width: 100%; }

  /* 导航信息浮层 */
  .nav-overlay {
    position: absolute;
    bottom: 14px;
    left: 14px;
    right: 14px;
    background: rgba(20,24,32,.92);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .nav-dir-icon {
    width: 42px; height: 42px;
    background: rgba(0,212,170,.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent2);
  }
  .nav-dir-icon svg { width: 22px; height: 22px; }
  .nav-info { flex: 1; }
  .nav-info .next-turn { font-size: 15px; font-weight: 600; color: var(--text); }
  .nav-info .street { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .nav-dist { text-align: right; }
  .nav-dist .dist-val { font-size: 20px; font-weight: 700; color: var(--accent2); }
  .nav-dist .dist-unit { font-size: 11px; color: var(--text2); }

  /* === 右侧媒体卡片 === */
  .media-card {
    flex: 1;
    background: var(--panel);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .media-cover {
    aspect-ratio: 1 / 1;
    background: linear-gradient(135deg, #1a1f2b 0%, #1e2433 40%, #1a2a38 100%);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .media-cover::before {
    content: '';
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #4da6ff, #00d4aa, #8b5cf6, #f59e0b, #4da6ff);
    opacity: .25;
    filter: blur(30px);
    animation: spin 12s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .media-cover .cover-disc {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #2a3040, #141820);
    border: 3px solid #252a35;
    position: relative;
    z-index: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .media-cover .cover-disc::after {
    content: '';
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text3);
    border: 2px solid #1a1f2b;
  }
  .media-info .song-title {
    font-size: 16px; font-weight: 600; color: var(--text);
  }
  .media-info .song-artist {
    font-size: 12px; color: var(--text2); margin-top: 3px;
  }
  .media-progress {
    display: flex; flex-direction: column; gap: 6px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    width: 42%;
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }
  .progress-times {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text3);
  }
  .media-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .media-ctrl-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text2);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all .15s;
  }
  .media-ctrl-btn:hover { color: var(--text); }
  .media-ctrl-btn.play {
    width: 52px; height: 52px;
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px rgba(77,166,255,.3);
  }
  .media-ctrl-btn.play:hover { transform: scale(1.06); }
  .media-ctrl-btn svg { width: 18px; height: 18px; }
  .media-ctrl-btn.play svg { width: 22px; height: 22px; }

  /* === 底部功能栏 === */
  .func-row {
    display: flex;
    gap: 14px;
    height: 140px;
  }

  /* === 功能卡片 === */
  .func-card {
    flex: 1;
    background: var(--panel);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .func-card .func-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .func-card .func-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.5px;
  }
  .func-card .func-value .unit {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-left: 2px;
  }

  /* 空调控制 */
  .climate-ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: auto;
  }
  .climate-temp-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .climate-seat {
    display: flex; gap: 14px;
  }
  .climate-seat-icon {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .climate-seat-icon svg { width: 28px; height: 28px; }
  .climate-seat-icon .seat-label { font-size: 10px; color: var(--text3); }
  .climate-seat-icon .heat-dots {
    display: flex; gap: 3px;
  }
  .heat-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
    transition: background .3s;
  }
  .heat-dot.on { background: var(--danger); }

  /* 车辆状态指示灯 */
  .car-indicators {
    display: flex; flex-direction: column; gap: 6px;
  }
  .car-ind {
    display: flex; justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
  }
  .car-ind .ind-val { color: var(--text); font-weight: 500; }
  .ind-val.good { color: var(--accent2); }
  .ind-val.warn { color: var(--warn); }

  /* 底部 Dock 图标 */
  .dock-bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .dock-climate {
    width: 46px; height: 46px;
    border-radius: 12px;
    background: rgba(77,166,255,.1);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
  }
  .dock-climate svg { width: 20px; height: 20px; }
  .dock-climate .temp-num {
    position: absolute;
    font-size: 9px;
    font-weight: 700;
    color: var(--accent);
  }

  /* === 暖通空调子面板 === */
  .hvac-panel {
    position: absolute;
    bottom: 0;
    left: 72px;
    right: 0;
    height: 220px;
    background: rgba(20,24,32,.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 20px 28px;
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .hvac-temp-display {
    font-size: 56px;
    font-weight: 200;
    color: var(--accent);
    letter-spacing: -2px;
    line-height: 1;
  }
  .hvac-temp-display .deg { font-size: 28px; }
  .hvac-zone {
    display: flex; flex-direction: column; gap: 8px;
  }
  .hvac-zone .zone-label {
    font-size: 11px; color: var(--text3); letter-spacing: 1px; font-weight: 600;
  }
  .hvac-slider {
    display: flex; gap: 12px; align-items: center;
  }
  .hvac-btn {
    width: 44px; height: 88px;
    border-radius: 22px;
    background: var(--panel2);
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: all .2s;
  }
  .hvac-btn:hover { border-color: var(--accent); }
  .hvac-btn .arrow { color: var(--text); font-size: 14px; }
  .hvac-btn .val { font-size: 13px; font-weight: 600; color: var(--text); }
  .airflow-visual {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 30px;
    color: var(--text3);
  }
  .airflow-visual svg { width: 40px; height: 40px; }
</style>
</head>
<body>

<div class="car-display">

  <!-- ===== 左侧 Dock ===== -->
  <div class="dock">
    <div class="dock-icon active" title="导航">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="10" r="3"/>
        <path d="M12 2a8 8 0 0 0-8 8c0 5.4 8 13 8 13s8-7.6 8-13a8 8 0 0 0-8-8z"/>
      </svg>
    </div>
    <div class="dock-icon" title="媒体">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="10"/>
        <polygon points="10,8 16,12 10,16"/>
      </svg>
    </div>
    <div class="dock-icon" title="电话">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </div>
    <div class="dock-spacer"></div>
    <div class="dock-icon" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </div>
    <div class="dock-climate" style="position:relative;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
    </div>
  </div>

  <!-- ===== 主区域 ===== -->
  <div class="main-area">
    <!-- 顶部状态栏 -->
    <div class="top-bar">
      <span class="time">14:36</span>
      <div class="status-icons">
        <span class="temp">🌡 24°C</span>
        <span class="signal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="14" width="5" height="8" rx="1"/><rect x="9" y="10" width="5" height="12" rx="1"/><rect x="17" y="6" width="5" height="16" rx="1"/></svg>
          5G
        </span>
        <span class="battery">
          <svg width="18" height="14" viewBox="0 0 24 14" fill="none"><rect x="0" y="0" width="21" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="3" width="14" height="8" rx="1.5" fill="currentColor"/><rect x="22" y="4" width="3" height="6" rx="1.5" fill="currentColor" opacity=".4"/></svg>
          82%
        </span>
      </div>
    </div>

    <!-- 双卡片行: 地图 + 媒体 -->
    <div class="card-row" style="flex:1; min-height:0;">
      <!-- 地图 -->
      <div class="map-card">
        <div class="map-header">
          <div class="map-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            搜索目的地...
          </div>
          <div class="map-compass">N</div>
        </div>

        <!-- 简化的地图 SVG -->
        <svg class="map-svg" viewBox="0 0 600 340" preserveAspectRatio="xMidYMid slice">
          <defs>
            <linearGradient id="roadGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#1e2a3a"/>
              <stop offset="50%" stop-color="#2a3a50"/>
              <stop offset="100%" stop-color="#1e2a3a"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- 背景 -->
          <rect width="600" height="340" fill="#0d1117"/>

          <!-- 次要道路 -->
          <line x1="80" y1="0" x2="120" y2="340" stroke="#151c26" stroke-width="2"/>
          <line x1="200" y1="0" x2="220" y2="340" stroke="#151c26" stroke-width="1.5"/>
          <line x1="350" y1="0" x2="340" y2="340" stroke="#151c26" stroke-width="1.5"/>
          <line x1="480" y1="0" x2="500" y2="340" stroke="#151c26" stroke-width="2"/>
          <line x1="0" y1="100" x2="600" y2="110" stroke="#151c26" stroke-width="1.5"/>
          <line x1="0" y1="200" x2="600" y2="190" stroke="#151c26" stroke-width="1.5"/>
          <line x1="0" y1="280" x2="600" y2="290" stroke="#151c26" stroke-width="1.5"/>

          <!-- 主干道 (高亮) -->
          <path d="M0 170 L280 170 L320 130 L600 130" stroke="url(#roadGrad)" stroke-width="6" fill="none"/>
          <path d="M180 0 L180 170" stroke="url(#roadGrad)" stroke-width="5" fill="none"/>
          <path d="M420 0 L420 130 L420 340" stroke="url(#roadGrad)" stroke-width="5" fill="none"/>

          <!-- 导航路线 (蓝色高亮) -->
          <path d="M180 340 L180 170 L280 170 L320 130 L600 130"
                stroke="#4da6ff" stroke-width="4" fill="none"
                stroke-dasharray="12 6" opacity=".9" filter="url(#glow)"/>

          <!-- 起点标记 -->
          <circle cx="180" cy="340" r="8" fill="#4da6ff" opacity=".3"/>
          <circle cx="180" cy="340" r="4" fill="#4da6ff"/>
          <circle cx="180" cy="340" r="2" fill="#fff"/>

          <!-- 终点标记 -->
          <circle cx="520" cy="130" r="10" fill="#ef4444" opacity=".2"/>
          <circle cx="520" cy="130" r="5" fill="#ef4444"/>
          <rect x="512" y="120" width="16" height="16" rx="3" fill="#ef4444" opacity=".3"/>
          <rect x="515" y="123" width="10" height="10" rx="2" fill="#ef4444"/>

          <!-- 当前位置 (车辆图标) -->
          <g transform="translate(220, 280)">
            <circle cx="0" cy="0" r="12" fill="#4da6ff" opacity=".25"/>
            <circle cx="0" cy="0" r="7" fill="#4da6ff" opacity=".6"/>
            <circle cx="0" cy="0" r="18" fill="none" stroke="#4da6ff" stroke-width="1.5" opacity=".4">
              <animate attributeName="r" from="18" to="28" dur="2s" repeatCount="indefinite"/>
              <animate attributeName="opacity" from="0.4" to="0" dur="2s" repeatCount="indefinite"/>
            </circle>
            <circle cx="0" cy="0" r="4" fill="#fff"/>
          </g>

          <!-- 街区块 -->
          <rect x="240" y="30" width="40" height="30" rx="2" fill="#111820" stroke="#1a2230" stroke-width=".5"/>
          <rect x="290" y="30" width="35" height="30" rx="2" fill="#111820" stroke="#1a2230" stroke-width=".5"/>
          <rect x="400" y="160" width="50" height="35" rx="2" fill="#111820" stroke="#1a2230" stroke-width=".5"/>
          <rect x="60" y="220" width="65" height="40" rx="2" fill="#111820" stroke="#1a2230" stroke-width=".5"/>

          <!-- 水体 -->
          <rect x="0" y="0" width="80" height="340" fill="#0a1628" opacity=".5"/>
          <path d="M70 0 Q75 80 68 160 Q62 240 72 340" stroke="#1a3050" stroke-width="1" fill="none"/>
        </svg>

        <!-- 导航浮层 -->
        <div class="nav-overlay">
          <div class="nav-dir-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
          <div class="nav-info">
            <div class="next-turn">300m 后右转</div>
            <div class="street">进入 科苑南路 → 深南大道</div>
          </div>
          <div class="nav-dist">
            <div class="dist-val">2.4</div>
            <div class="dist-unit">公里</div>
          </div>
        </div>
      </div>

      <!-- 媒体卡片 -->
      <div class="media-card">
        <div class="media-cover">
          <div class="cover-disc"></div>
        </div>
        <div class="media-info">
          <div class="song-title">Blinding Lights</div>
          <div class="song-artist">The Weeknd</div>
        </div>
        <div class="media-progress">
          <div class="progress-bar"><div class="progress-fill"></div></div>
          <div class="progress-times">
            <span>1:24</span><span>3:20</span>
          </div>
        </div>
        <div class="media-controls">
          <button class="media-ctrl-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="4" x2="5" y2="20" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button class="media-ctrl-btn play">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
          </button>
          <button class="media-ctrl-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20" stroke="currentColor" stroke-width="2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 底部功能卡片行 -->
    <div class="func-row">
      <!-- 续航 & 电池 -->
      <div class="func-card">
        <div class="func-label">续航里程</div>
        <div class="func-value">486<span class="unit">km</span></div>
        <div style="display:flex; gap:8px; align-items:center;">
          <div style="flex:1; height:4px; background:var(--border); border-radius:2px;">
            <div style="width:68%; height:100%; background:var(--accent2); border-radius:2px;"></div>
          </div>
          <span style="font-size:11px; color:var(--text3);">68%</span>
        </div>
      </div>

      <!-- 空调 -->
      <div class="func-card">
        <div class="func-label">空调</div>
        <div style="display:flex; align-items:baseline; gap:4px;">
          <span class="func-value" style="color:var(--accent);">22<span class="unit">°C</span></span>
          <span style="font-size:11px; color:var(--text3);">AUTO</span>
        </div>
        <div class="climate-ctrl">
          <button class="climate-temp-btn">−</button>
          <div style="display:flex; gap:8px; align-items:center;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#5a6170" stroke-width="1.5">
              <path d="M6 12h12M12 6v12"/>
            </svg>
            <span style="font-size:12px; color:var(--text2);">A/C</span>
          </div>
          <button class="climate-temp-btn">+</button>
        </div>
        <div class="climate-seat">
          <div class="climate-seat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#8b92a0" stroke-width="1.5">
              <path d="M6 3h4l2 8H8l-2-8zM18 3h-4l-2 8h4l2-8z"/>
              <rect x="6" y="11" width="4" height="10" rx="1"/>
              <rect x="14" y="11" width="4" height="10" rx="1"/>
            </svg>
            <span class="seat-label">左</span>
            <div class="heat-dots">
              <div class="heat-dot on"></div>
              <div class="heat-dot on"></div>
              <div class="heat-dot"></div>
            </div>
          </div>
          <div class="climate-seat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#8b92a0" stroke-width="1.5">
              <path d="M6 3h4l2 8H8l-2-8zM18 3h-4l-2 8h4l2-8z"/>
              <rect x="6" y="11" width="4" height="10" rx="1"/>
              <rect x="14" y="11" width="4" height="10" rx="1"/>
            </svg>
            <span class="seat-label">右</span>
            <div class="heat-dots">
              <div class="heat-dot"></div>
              <div class="heat-dot"></div>
              <div class="heat-dot"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 车辆状态 -->
      <div class="func-card">
        <div class="func-label">车辆状态</div>
        <div class="car-indicators">
          <div class="car-ind">
            <span>胎压</span>
            <span class="ind-val good">2.5 bar</span>
          </div>
          <div class="car-ind">
            <span>驾驶模式</span>
            <span class="ind-val" style="color:var(--accent);">舒适</span>
          </div>
          <div class="car-ind">
            <span>里程</span>
            <span class="ind-val">32,860 km</span>
          </div>
          <div class="car-ind">
            <span>保养</span>
            <span class="ind-val warn">1200km 后</span>
          </div>
        </div>
      </div>

      <!-- 快捷功能 -->
      <div class="func-card" style="align-items:center; justify-content:center; gap:14px;">
        <div style="display:flex; gap:10px;">
          <div style="width:52px;height:52px;border-radius:14px;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8b92a0" stroke-width="1.8">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <line x1="3" y1="9" x2="21" y2="9"/>
              <line x1="9" y1="21" x2="9" y2="9"/>
            </svg>
          </div>
          <div style="width:52px;height:52px;border-radius:14px;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8b92a0" stroke-width="1.8">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div style="width:52px;height:52px;border-radius:14px;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8b92a0" stroke-width="1.8">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>
        <div style="display:flex; gap:10px;">
          <div style="width:52px;height:52px;border-radius:14px;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8b92a0" stroke-width="1.8">
              <rect x="1" y="3" width="15" height="14" rx="2"/>
              <polygon points="23 7 16 12 16 14 23 18"/>
            </svg>
          </div>
          <div style="width:52px;height:52px;border-radius:14px;background:rgba(77,166,255,.12);border:1px solid rgba(77,166,255,.25);display:flex;align-items:center;justify-content:center;cursor:pointer;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4da6ff" stroke-width="1.8">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="8 12 11 15 16 9"/>
            </svg>
          </div>
          <div style="width:52px;height:52px;border-radius:14px;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8b92a0" stroke-width="1.8">
              <line x1="4" y1="21" x2="4" y2="14"/>
              <line x1="4" y1="10" x2="4" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="12"/>
              <line x1="12" y1="8" x2="12" y2="3"/>
              <line x1="20" y1="21" x2="20" y2="16"/>
              <line x1="20" y1="12" x2="20" y2="3"/>
              <line x1="1" y1="14" x2="7" y2="14"/>
              <line x1="9" y1="8" x2="15" y2="8"/>
              <line x1="17" y1="16" x2="23" y2="16"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
